/* ===== Темный режим ===== */

<script>

/* ===== Темный режим: localStorage + авто тема устройства ===== */
const THEME_KEY = "gos_exam_theme";
const themeToggle = document.getElementById("themeToggle");
function applyTheme(theme){
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem(THEME_KEY, theme);
  if(themeToggle){
    themeToggle.textContent = theme === "dark" ? "☀️" : "🌙";
    themeToggle.setAttribute("aria-label", theme === "dark" ? "Включить светлую тему" : "Включить темную тему");
  }
}
function initTheme(){
  const saved = localStorage.getItem(THEME_KEY);
  const systemDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved || (systemDark ? "dark" : "light"));
}
initTheme();
if(themeToggle){
  themeToggle.addEventListener("click",()=>{
    const currentTheme = document.documentElement.getAttribute("data-theme") || "light";
    applyTheme(currentTheme === "dark" ? "light" : "dark");
  });
}

  { key:"audit", name:"Аудит", desc:"30 вопросов и ответов", questions:[
  {id:1,  q:"Сущность, содержание, виды и типы аудита", a:"Аудит — независимая проверка финансовой отчетности с целью выражения мнения о ее достоверности. Бывает внешний и внутренний аудит. По обязательности делится на обязательный и инициативный. Также различают финансовый, операционный и налоговый аудит."},
  {id:2,  q:"Международные стандарты аудита", a:"МСА — это единые международные правила проведения аудита, которые регулируют планирование, сбор доказательств и формирование мнения аудитора. Они обеспечивают качество, сопоставимость и прозрачность аудиторских проверок."},
  {id:3,  q:"Государственное регулирование аудиторской деятельности", a:"Регулирование осуществляется государством через законы об аудите, лицензирование или аттестацию аудиторов, а также контроль качества аудиторских услуг и соблюдение стандартов."},
  {id:4,  q:"Существенность и риск. Внутренний контроль и доказательства", a:"Существенность — уровень ошибок, влияющих на решения пользователей отчетности. Аудиторский риск — вероятность выражения неправильного мнения. Внутренний контроль снижает риск, а доказательства собираются через документы, анализ и проверки."},
  {id:5,  q:"Аудиторская документация", a:"Рабочие документы аудитора фиксируют все этапы проверки: план, процедуры, полученные доказательства и выводы. Они служат основой для формирования аудиторского мнения и подтверждения выполненной работы."},
  {id:6,  q:"Аудит доходов и расходов", a:"Проверяется правильность признания доходов и расходов, их соответствие учетной политике и стандартам. Особое внимание уделяется полноте отражения операций и правильности формирования финансового результата."},
  {id:7,  q:"Аудиторское заключение", a:"Это официальный документ с мнением аудитора. Бывает безусловно положительное, с оговоркой, отрицательное и отказ от выражения мнения. Структура включает вводную часть, описание проверки и итоговое мнение."},
  {id:8,  q:"Права и обязанности аудиторов", a:"Аудитор имеет право получать документы, объяснения и доступ к информации. Обязан соблюдать независимость, конфиденциальность и профессиональную этику, а также действовать объективно."},
  {id:9,  q:"Аудит расчетов с бюджетом", a:"Проверяется правильность начисления и своевременность уплаты налогов и обязательных платежей, соответствие налоговому законодательству и отсутствие недоимок."},
  {id:10, q:"Аудит учетной политики", a:"Оценивается правильность формирования учетной политики предприятия, ее соответствие законодательству и последовательность применения в отчетных периодах."},
  {id:11, q:"Аудит кассовых и банковских операций", a:"Проверяется правильность учета наличных и безналичных операций, соответствие первичным документам и контроль за движением денежных средств."},
  {id:12, q:"Аудит дебиторской задолженности", a:"Проверяется обоснованность задолженности, ее реальность и своевременность погашения. Также оценивается создание резерва по сомнительным долгам."},
  {id:13, q:"Аудит основных средств и НМА", a:"Проверяется наличие активов, правильность их оценки, начисление амортизации и отражение операций по поступлению и выбытию."},
  {id:14, q:"Аудит ТМЦ", a:"Контролируется правильность учета запасов, их движение, оценка и соответствие фактических остатков учетным данным."},
  {id:15, q:"Аудит себестоимости продукции", a:"Проверяется правильность формирования затрат, включение всех производственных расходов и распределение косвенных затрат."},
  {id:16, q:"Аудит финансовых результатов", a:"Анализируется правильность формирования прибыли или убытка, корректность отражения доходов и расходов и закрытие счетов."},
  {id:17, q:"Аудит расчетных и кредитных операций", a:"Проверяется учет кредитов, займов и расчетов с поставщиками и покупателями, а также своевременность погашения обязательств."},
  {id:18, q:"Методы аудита", a:"Используются документальные методы (проверка документов, отчетов) и фактические методы (инвентаризация, наблюдение, контрольные замеры)."},
  {id:19, q:"Аудит долгосрочной кредиторской задолженности", a:"Проверяется обоснованность долгосрочных обязательств, условия договоров и правильность отражения задолженности в отчетности."},
  {id:20, q:"Роль финансового анализа в аудите", a:"Финансовый анализ помогает оценить финансовое состояние предприятия, выявить риски и определить проблемные участки учета."},
  {id:21, q:"Аудит выпуска и продажи продукции", a:"Проверяется правильность отражения выпуска продукции, ее отгрузки, реализации и формирования выручки."},
  {id:22, q:"Системы бухгалтерского учета и внутренний контроль", a:"Аудитор оценивает надежность системы учета и эффективность внутреннего контроля, которые влияют на уровень аудиторского риска."},
  {id:23, q:"Аудит капитала, резервов и фондов", a:"Проверяется правильность формирования уставного капитала, добавочного капитала и резервов предприятия."},
  {id:24, q:"Аудит расчетов с персоналом", a:"Проверяется правильность начисления заработной платы, удержаний и своевременность выплат работникам."},
  {id:25, q:"Планирование аудита", a:"Включает разработку общего плана и программы аудита, определение объема, сроков и методов проверки."},
  {id:26, q:"Аудит социального страхования", a:"Проверяется правильность начисления и уплаты социальных взносов и их отражение в учете."},
  {id:27, q:"Аудит учредительных документов", a:"Проверяется законность создания предприятия, правильность учредительных документов и расчетов с учредителями."},
  {id:28, q:"Аудит финансовой отчетности", a:"Проверяется полнота, достоверность и соответствие отчетности требованиям стандартов и законодательства."},
  {id:29, q:"Аттестация и лицензирование аудиторской деятельности", a:"Аттестация подтверждает квалификацию аудитора, а лицензирование дает право на осуществление аудиторской деятельности."},
  {id:30, q:"Профессиональная этика аудиторов", a:"Основные принципы: независимость, честность, объективность, профессиональная компетентность и конфиденциальность информации."}

  { key:"econ", name:"Экономический анализ", desc:"30 вопросов и ответов", questions:[
  {id:1,  q:"Сущность, значение, задачи, виды экономического анализа", a:"Это система научных знаний для изучения хозяйственных процессов, выявления резервов и обоснования планов; делится на финансовый (внешний) и управленческий (внутренний)."},
  {id:2,  q:"Информационное обеспечение экономического анализа", a:"Включает в себя учетные источники (бухгалтерская, налоговая и статистическая отчетность), плановые данные (бизнес-планы, сметы) и внеучетные сведения (нормативные акты, законы КР)."},
  {id:3,  q:"Оценка объективности информации, используемой при анализе", a:"Проводится путем арифметической (технической) проверки и логической увязки взаимосвязанных показателей разных форм отчетности для исключения искажений."},
  {id:4,  q:"Метод экономического анализа. Способы и приемы экономического анализа", a:"Метод заключается в системном изучении деятельности через расчленение явлений на факторы; реализуется с помощью традиционных (сравнение, балансовый) и математических приемов."},
  {id:5,  q:"Способы обработки экономической информации в анализе деятельности хозяйствующих субъектов", a:"Применяются приемы сравнения (с планом, прошлыми периодами), построения аналитических группировок, расчета средних и относительных величин, а также балансовая увязка."},
  {id:6,  q:"Способы изменения влияния факторов в экономическом анализе", a:"Для расчета влияния факторов используются детерминированные методы: цепные подстановки, абсолютные разницы, относительные разницы и интегральный метод."},
  {id:7,  q:"Анализ производства и реализации продукции", a:"Направлен на оценку выполнения плана по объему, ассортименту, структуре, качеству и ритмичности выпуска продукции, а также на факторный анализ выручки."},
  {id:8,  q:"Анализ состояния и эффективности использования основных средств", a:"Оценивает движение фондов (коэффициенты обновления, выбытия, износа) и отдачу от них через показатели фондоотдачи, фондоемкости и фондовооруженности."},
  {id:9,  q:"Анализ обеспеченности материальными ресурсами и эффективности их использования", a:"Проверяет выполнение договоров поставок, состояние запасов (ТМЗ) и оценивает рациональность их потребления через показатели материалоемкости и материалоотдачи."},
  {id:10, q:"Анализ обеспеченности трудовыми ресурсами и эффективности их использования", a:"Изучает состав, структуру и текучесть кадров, использование фонда рабочего времени, а также производительность труда (выработку и трудоемкость)."},
  {id:11, q:"Анализ расходов на оплату труда", a:"Проверяет состав и динамику фонда заработной платы (ФЗП), а также контролирует обязательное экономическое правило: темпы роста производительности труда должны опережать темпы роста его оплаты."},
  {id:12, q:"Анализ денежных потоков", a:"Изучает притоки и оттоки денег по операционной, инвестиционной и финансовой деятельности прямым (по счетам) или косвенным (корректировка прибыли) методом."},
  {id:13, q:"Анализ себестоимости продукции", a:"Оценивает затраты предприятия по экономическим элементам и калькуляционным статьям, а также анализирует ключевой показатель — затраты на 1 сом произведенной продукции."},
  {id:14, q:"Маржинальный анализ", a:"Базируется на делении затрат на постоянные и переменные, позволяя рассчитать точку безубыточности (порог рентабельности) и запас финансовой прочности предприятия."},
  {id:15, q:"Общая оценка динамики, состава и структуры имущества предприятия", a:"Проводится с помощью горизонтального (изменение во времени) и вертикального (удельный вес статей) анализа актива бухгалтерского баланса."},
  {id:16, q:"Анализ финансового и операционного левериджа", a:"Операционный рычаг показывает зависимость прибыли от объема продаж и уровня постоянных затрат, а финансовый рычаг — изменение рентабельности капитала за счет использования кредитов."},
  {id:17, q:"Анализ ликвидности и платежеспособности предприятия по данным бухгалтерского баланса", a:"Оценивает способность компании гасить обязательства с помощью расчета коэффициентов абсолютной, быстрой (критической) и текущей ликвидности."},
  {id:18, q:"Анализ ликвидности бухгалтерского баланса", a:"Заключается в сопоставлении средств по активу, сгруппированных по срокам превращения в деньги (А1−А4), с обязательствами по пассиву, сгруппированных по срочности погашения (П1−П4)."},
  {id:19, q:"Анализ оборотных активов", a:"Изучает состав, структуру и скорость оборачиваемости текущих активов (в оборотах и днях), выявляя скрытое затоваривание складов или отвлечение денег."},
  {id:20, q:"Анализ состава, структуры и динамики дебиторской задолженности", a:"Оценивает объем и сроки неплатежей покупателей, долю сомнительных долгов и сопоставляет дебиторскую задолженность с кредиторской для контроля баланса средств."},
  {id:21, q:"Анализ финансовой устойчивости", a:"Определяет уровень независимости предприятия от внешних кредиторов в долгосрочной перспективе с помощью коэффициентов автономии, маневренности и обеспеченности собственными оборотными средствами."},
  {id:22, q:"Анализ динамики состава и структуры источников финансовых ресурсов", a:"Исследует пассив баланса для оценки соотношения между собственным капиталом и заемными средствами (краткосрочными и долгосрочными обязательствами)."},
  {id:23, q:"Анализ движения собственного капитала", a:"Изучает по данным финансовой отчетности источники формирования, поступление, использование и прирост уставного, резервного, добавочного капитала и нераспределенной прибыли."},
  {id:24, q:"Анализ движения заемного капитала", a:"Проверяет структуру привлеченных кредитов и займов, эффективность их использования, а также своевременность расчетов по кредиторской задолженности перед поставщиками, бюджетом и Соцфондом."},
  {id:25, q:"Критерии оценки неплатежеспособности и вероятности банкротства организации", a:"Опирается на расчет коэффициентов текущей ликвидности, обеспеченности собственными оборотными средствами, а также оценку возможности восстановления или утраты платежеспособности."},
  {id:26, q:"Анализ деловой активности предприятия", a:"Измеряет скорость оборота всех ресурсов компании и проверяет «золотое правило»: темпы роста прибыли должны опережать рост выручки и активов."},
  {id:27, q:"Общая оценка динамики прибыли. Факторный анализ прибыли от продаж", a:"Оценивает изменение чистой и валовой прибыли, а также измеряет влияние цен, себестоимости, объема и структуры продаж на величину прибыли от реализации."},

  {id:29, q:"Комплексная оценка деятельности организации по данным финансовой отчетности", a:"Сводит воедино все аналитические показатели с помощью методов рейтинговой оценки (метод сумм мест, расстояний) для вынесения итогового заключения о работе фирмы."},
  {id:30, q:"Пути оздоровления financial состояния субъектов хозяйствования", a:"Включают оперативные меры (взыскание дебиторской задолженности, распродажа излишков ТМЗ, реструктуризация долгов) и стратегические (модернизация, снижение материалоемкости и поиск инвесторов)."}
] }

let current = null;
let order = [];
let index = 0;
let score = 0;
let answered = false;
let masteredCards = [];
const home = document.getElementById("home");
const app = document.getElementById("app");
const work = document.getElementById("work");
const icons = ["📘","🧾","📊"];
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
function renderHome(){document.getElementById("subjectGrid").innerHTML=SUBJECTS.map((s,i)=>`<button class="subject" onclick="selectSubject(${i})"><div><div class="icon">${icons[i]||"📚"}</div><h2>${escapeHtml(s.name)}</h2><p class="muted">${escapeHtml(s.desc)}</p></div><span class="pill">Начать →</span></button>`).join("");}
function selectSubject(i){current=SUBJECTS[i];document.getElementById("subjectGrid").classList.add("hidden");home.classList.add("hidden");app.classList.remove("hidden");document.getElementById("title").textContent=current.name;document.getElementById("subtitle").textContent=current.questions.length+" вопросов · выбери режим подготовки";startExam();window.scrollTo({top:0,behavior:"smooth"});}
function goHome(){app.classList.add("hidden");home.classList.remove("hidden");document.getElementById("subjectGrid").classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"});}
function progressHtml(){const pct=order.length?Math.round((index/order.length)*100):0;return `<div class="progress-wrap"><div class="progress-row"><span>Вопрос ${Math.min(index+1,order.length)} / ${order.length}</span><span>${pct}%</span></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div>`;}
function setActiveMode(mode){document.querySelectorAll("[data-mode-btn]").forEach(btn=>{const active=btn.dataset.modeBtn===mode;btn.classList.toggle("mode-active",active);btn.classList.toggle("secondary",!active);btn.setAttribute("aria-current",active?"page":"false");});}
function startExam(){setActiveMode("exam");order=shuffle(current.questions);index=0;score=0;answered=false;renderExam();}
function makeOptions(q){const wrong=shuffle(current.questions.filter(x=>x.id!==q.id)).slice(0,3).map(x=>x.a);return shuffle([q.a,...wrong]);}
function renderExam(){if(index>=order.length)return renderResult();answered=false;const q=order[index];const opts=makeOptions(q);work.innerHTML=`<div class="card">${progressHtml()}<div class="mode">Обычный экзамен</div><div class="qtext">${escapeHtml(q.q)}</div><div class="options">${opts.map((o,n)=>`<button class="opt" onclick="chooseAnswer(this, ${JSON.stringify(o===q.a)})"><b>${String.fromCharCode(65+n)}.</b> ${escapeHtml(o)}</button>`).join("")}</div><div id="after"></div></div>`;}
function chooseAnswer(btn,ok){if(answered)return;answered=true;const q=order[index];document.querySelectorAll(".opt").forEach(b=>{b.disabled=true;if(b.textContent.replace(/^[A-D]\.\s*/,"").trim()===q.a)b.classList.add("correct");});if(ok){score++;btn.classList.add("correct");}else btn.classList.add("wrong");document.getElementById("after").innerHTML=`<div class="answer"><b>Правильный ответ:</b><br>${escapeHtml(q.a)}</div><div class="btns"><button class="btn" onclick="nextQuestion()">Следующий вопрос</button></div>`;}
function nextQuestion(){index++;renderExam();}
function renderResult(){setActiveMode("exam");const pct=Math.round(score/order.length*100);work.innerHTML=`<div class="card"><div class="mode">Результат</div><div class="result">${score} / ${order.length}</div><p class="muted">Правильных ответов: ${pct}%</p><div class="btns"><button class="btn" onclick="startExam()">Пройти ещё раз</button><button class="btn secondary" onclick="startCards()">Учить карточками</button><button class="btn secondary" onclick="showAll()">Посмотреть все вопросы</button></div></div>`;}
function startCards(){
  setActiveMode("cards");
  order = shuffle(current.questions);
  masteredCards = [];
  index = 0;
  renderCard();
}
function renderCard(){
  if(order.length === 0){
    work.innerHTML = `<div class="card"><div class="mode">Карточки завершены</div><div class="result">${masteredCards.length} / ${current.questions.length}</div><p class="muted">Все вопросы освоены ✅</p><div class="btns"><button class="btn" onclick="startCards()">Повторить заново</button><button class="btn secondary" onclick="showAll()">Все вопросы</button></div></div>`;
    return;
  }
  const q = order[index];
  const mastered = masteredCards.length;
  const total = current.questions.length;
  const pct = Math.round((mastered / total) * 100);
  work.innerHTML = `<div class="progress-wrap"><div class="progress-row"><span>Освоено ${mastered} / ${total}</span><span>${pct}%</span></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div><div class="study-stats"><span>Осталось: ${order.length}</span><span>Карточка ${index + 1} / ${order.length}</span></div><div class="flip" id="flip" onclick="this.classList.toggle('flipped')"><div class="flip-inner"><div class="face"><div class="mode">Вопрос</div><div class="qtext">${escapeHtml(q.q)}</div><p class="muted">Нажми на карточку, чтобы увидеть ответ.</p></div><div class="face back"><div class="mode">Ответ</div><div class="ans">${escapeHtml(q.a)}</div><p class="muted">Выбери: знаешь или повторить позже.</p></div></div></div><div class="card-actions"><button class="btn good" onclick="knowCard(event)">✅ Знаю</button><button class="btn bad" onclick="dontKnowCard(event)">🔁 Не знаю</button><button class="btn secondary" onclick="prevCard(event)">← Назад</button><button class="btn secondary" onclick="nextCard(event)">Дальше →</button></div>`;
}
function knowCard(e){
  e.stopPropagation();
  const q = order[index];
  masteredCards.push(q.id);
  order.splice(index, 1);
  if(index >= order.length){ index = 0; }
  renderCard();
}
function dontKnowCard(e){
  e.stopPropagation();
  const q = order.splice(index, 1)[0];
  order.push(q);
  if(index >= order.length){ index = 0; }
  renderCard();
}
function nextCard(e){
  e.stopPropagation();
  if(!order.length) return;
  index = (index + 1) % order.length;
  renderCard();
}
function prevCard(e){
  e.stopPropagation();
  if(!order.length) return;
  index = (index - 1 + order.length) % order.length;
  renderCard();
}
function showAll(){setActiveMode("all");work.innerHTML=`<div class="card"><div class="mode">Все вопросы</div><input class="search" id="search" placeholder="Поиск по вопросам и ответам..." oninput="filterAll()"><div class="list" id="allList"></div></div>`;filterAll();}
function filterAll(){const term=(document.getElementById("search")?.value||"").toLowerCase().trim();const list=current.questions.filter(q=>(q.q+" "+q.a).toLowerCase().includes(term));document.getElementById("allList").innerHTML=list.map(q=>`<div class="row"><b>${q.id}. ${escapeHtml(q.q)}</b><span class="muted">${escapeHtml(q.a)}</span></div>`).join("")||`<p class="muted">Ничего не найдено.</p>`;}
renderHome();
</script>
