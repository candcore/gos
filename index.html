<title>Гос экзамен · 3 предмета</title>
<style>
:root{
  --bg:#eef2f7;--card:#ffffff;--text:#172033;--muted:#64748b;--primary:#2563eb;
  --primary-dark:#1d4ed8;--good:#16a34a;--bad:#dc2626;--line:#d8e0ec;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,system-ui,sans-serif;background:linear-gradient(135deg,#e0f2fe,#f8fafc);color:var(--text);min-height:100vh}
.wrap{max-width:980px;margin:0 auto;padding:20px}
.top{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 12px 35px rgba(15,23,42,.08);margin-bottom:16px}
h1{margin:0 0 8px;font-size:28px} h2{margin:0 0 12px} p{line-height:1.55}
.muted{color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:760px){.grid{grid-template-columns:1fr}}
.subject{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;text-align:left;cursor:pointer;transition:.15s;min-height:170px}
.subject:hover{transform:translateY(-2px);border-color:var(--primary);box-shadow:0 10px 25px rgba(37,99,235,.12)}
.subject b{font-size:20px;display:block;margin-bottom:10px}
.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
button{border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer;background:var(--primary);color:white;font-size:15px}
button:hover{background:var(--primary-dark)}
button.ghost{background:#eef2ff;color:var(--primary)}
button.good{background:var(--good)} button.bad{background:var(--bad)}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 12px 35px rgba(15,23,42,.08)}
.hidden{display:none!important}
.progress{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin:12px 0}
.bar{height:100%;background:var(--primary);width:0;transition:.2s}
.qtext{font-size:22px;font-weight:800;line-height:1.35;margin:12px 0}
.answer{background:#f0fdf4;border-left:5px solid var(--good);padding:14px;border-radius:12px;margin-top:14px;line-height:1.55}
.options{display:grid;gap:10px;margin-top:16px}
.opt{background:#f8fafc;color:var(--text);border:1px solid var(--line);text-align:left;font-weight:500}
.opt:hover{background:#eef2ff}
.opt.correct{border-color:var(--good);background:#dcfce7}
.opt.wrong{border-color:var(--bad);background:#fee2e2}
.flip{perspective:1000px;margin-top:12px}
.flip-inner{position:relative;min-height:300px;transition:transform .45s;transform-style:preserve-3d}
.flip.flipped .flip-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;background:white;border:1px solid var(--line);border-radius:18px;padding:24px;backface-visibility:hidden;display:flex;flex-direction:column;justify-content:center;box-shadow:0 12px 35px rgba(15,23,42,.08)}
.back{transform:rotateY(180deg);background:#f0fdf4}
.small{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.result{font-size:42px;font-weight:900;color:var(--primary);margin:8px 0}
.list{display:grid;gap:10px;margin-top:14px}
.row{padding:12px;border:1px solid var(--line);border-radius:12px;background:#f8fafc}
</style>
</head>

  </section>
</div>

  {id:14, q:"Маржинальный анализ", a:"Базируется на делении затрат на постоянные и переменные, позволяя рассчитать точку безубыточности (порог рентабельности) и запас финансовой прочности предприятия."},
  {id:15, q:"Общая оценка динамики, состава и структуры имущества предприятия", a:"Проводится с помощью горизонтального (изменение во времени) и вертикального (удельный вес статей) анализа актива бухгалтерского баланса."},
  {id:16, q:"Анализ финансового и операционного левериджа", a:"Операционный рычаг показывает зависимость прибыли от объема продаж и уровня постоянных затрат, а финансовый рычаг — изменение рентабельности капитала за счет использования кредитов."},

  {id:18, q:"Анализ ликвидности бухгалтерского баланса", a:"Заключается в сопоставлении средств по активу, сгруппированных по срокам превращения в деньги (А1−А4), с обязательствами по пассиву, сгруппированных по срочности погашения (П1−П4)."},

  {id:20, q:"Анализ состава, структуры и динамики дебиторской задолженности", a:"Оценивает объем и сроки неплатежей покупателей, долю сомнительных долгов и сопоставляет дебиторскую задолженность с кредиторской для контроля баланса средств."},
  {id:21, q:"Анализ финансовой устойчивости", a:"Определяет уровень независимости предприятия от внешних кредиторов в долгосрочной перспективе с помощью коэффициентов автономии, маневренности и обеспеченности собственными оборотными средствами."},

  {id:25, q:"Критерии оценки неплатежеспособности и вероятности банкротства организации", a:"Опирается на расчет коэффициентов текущей ликвидности, обеспеченности собственными оборотными средствами, а также оценку возможности восстановления или утраты платежеспособности."},

  {id:28, q:"Анализ показателей рентабельности", a:"Определяет относительную экономическую эффективность бизнеса через коэффициенты рентабельности продаж (ROS), активов (ROA) и собственного капитала (ROE)."},
  {id:29, q:"Комплексная оценка деятельности организации по данным финансовой отчетности", a:"Сводит воедино все аналитические показатели с помощью методов рейтинговой оценки (метод сумм мест, расстояний) для вынесения итогового заключения о работе фирмы."},
  {id:30, q:"Пути оздоровления financial состояния субъектов хозяйствования", a:"Включают оперативные меры (взыскание дебиторской задолженности, распродажа излишков ТМЗ, реструктуризация долгов) и стратегические (модернизация, снижение материалоемкости и поиск инвесторов)."}

];

let current = null;
let mode = "exam";
let order = [];
let index = 0;
let score = 0;
let answered = false;

const home = document.getElementById("home");
const app = document.getElementById("app");
const work = document.getElementById("work");

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}
function renderHome(){
  document.getElementById("subjectGrid").innerHTML = SUBJECTS.map((s,i)=>`
    <button class="subject" onclick="selectSubject(${i})">
      <b>${escapeHtml(s.name)}</b>
      <span class="muted">${escapeHtml(s.desc)}</span>
      <p>Нажми, чтобы начать подготовку.</p>
    </button>
  `).join("");
}
function selectSubject(i){
  current = SUBJECTS[i];
  home.classList.add("hidden");
  app.classList.remove("hidden");
  document.getElementById("title").textContent = current.name;
  document.getElementById("subtitle").textContent = current.questions.length + " вопросов";
  startExam();
}
function goHome(){
  app.classList.add("hidden");
  home.classList.remove("hidden");
}
function progressHtml(){
  return `<div class="muted">Вопрос ${index+1} / ${order.length}</div><div class="progress"><div class="bar" style="width:${(index/order.length)*100}%"></div></div>`;
}

function startExam(){
  mode = "exam"; order = shuffle(current.questions); index = 0; score = 0; answered = false; renderExam();
}
function makeOptions(q){
  const wrong = shuffle(current.questions.filter(x=>x.id!==q.id)).slice(0,3).map(x=>x.a);
  return shuffle([q.a, ...wrong]);
}
function renderExam(){
  if(index >= order.length) return renderResult();
  answered = false;
  const q = order[index];
  const opts = makeOptions(q);
  work.innerHTML = `<div class="card">
    ${progressHtml()}
    <div class="small">Обычный экзамен</div>
    <div class="qtext">${escapeHtml(q.q)}</div>
    <div class="options">
      ${opts.map(o=>`<button class="opt" onclick="chooseAnswer(this, ${JSON.stringify(o===q.a)})">${escapeHtml(o)}</button>`).join("")}
    </div>
    <div id="after"></div>
  </div>`;
}
function chooseAnswer(btn, ok){
  if(answered) return;
  answered = true;
  const q = order[index];
  document.querySelectorAll(".opt").forEach(b=>{
    b.disabled = true;
    if(b.textContent === q.a) b.classList.add("correct");
  });
  if(ok){ score++; btn.classList.add("correct"); }
  else btn.classList.add("wrong");
  document.getElementById("after").innerHTML = `
    <div class="answer"><b>Правильный ответ:</b><br>${escapeHtml(q.a)}</div>
    <div class="btns"><button onclick="nextQuestion()">Следующий</button></div>`;
}
function nextQuestion(){ index++; renderExam(); }
function renderResult(){
  work.innerHTML = `<div class="card">
    <div class="small">Результат</div>
    <div class="result">${score} / ${order.length}</div>
    <p class="muted">Процент: ${Math.round(score/order.length*100)}%</p>
    <div class="btns">
      <button onclick="startExam()">Пройти ещё раз</button>
      <button class="ghost" onclick="startCards()">Учить карточками</button>
    </div>
  </div>`;
}

function startCards(){
  mode = "cards"; order = current.questions.slice(); index = 0; renderCard();
}
function renderCard(){
  const q = order[index];
  work.innerHTML = `<div>
    <div class="muted">Карточка ${index+1} / ${order.length}</div>
    <div class="progress"><div class="bar" style="width:${((index+1)/order.length)*100}%"></div></div>
    <div class="flip" id="flip" onclick="this.classList.toggle('flipped')">
      <div class="flip-inner">
        <div class="face">
          <div class="small">Вопрос</div>
          <div class="qtext">${escapeHtml(q.q)}</div>
          <p class="muted">Нажми на карточку, чтобы увидеть ответ.</p>
        </div>
        <div class="face back">
          <div class="small">Ответ</div>
          <p style="font-size:20px;line-height:1.55">${escapeHtml(q.a)}</p>
          <p class="muted">Нажми ещё раз, чтобы вернуться к вопросу.</p>
        </div>
      </div>
    </div>
    <div class="btns">
      <button class="ghost" onclick="prevCard(event)">Назад</button>
      <button onclick="nextCard(event)">Дальше</button>
    </div>
  </div>`;
}
function nextCard(e){ e.stopPropagation(); index = (index + 1) % order.length; renderCard(); }
function prevCard(e){ e.stopPropagation(); index = (index - 1 + order.length) % order.length; renderCard(); }

function showAll(){
  work.innerHTML = `<div class="card">
    <div class="small">Все вопросы</div>
    <div class="list">
    ${current.questions.map(q=>`<div class="row"><b>${q.id}. ${escapeHtml(q.q)}</b><br><span class="muted">${escapeHtml(q.a)}</span></div>`).join("")}
    </div>
  </div>`;
}

renderHome();
</script>
</body>
</html>
